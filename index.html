<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebBins</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Theme variables ── */
/* Default = dark */
:root{
  --bg:#0d1117;--surface:#161b22;--s2:#1c2128;
  --border:#30363d;--border2:#3d444d;
  --accent:#58a6ff;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --green:#3fb950;--amber:#d29922;--red:#f85149;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --r:6px;--rl:12px;
}
/* System light preference (only when no explicit override) */
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#ffffff;--surface:#f6f8fa;--s2:#eaeef2;
    --border:#d0d7de;--border2:#c6cdd5;
    --text:#1f2328;--text2:#636c76;--text3:#a0aab4;
  }
}
/* Explicit light (overrides system dark) */
[data-theme="light"]{
  --bg:#ffffff;--surface:#f6f8fa;--s2:#eaeef2;
  --border:#d0d7de;--border2:#c6cdd5;
  --text:#1f2328;--text2:#636c76;--text3:#a0aab4;
}
/* Explicit dark (overrides system light) */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--s2:#1c2128;
  --border:#30363d;--border2:#3d444d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
}

body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;transition:background .15s,color .15s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.wrap{max-width:1020px;margin:0 auto;padding:0 20px}

/* ── header ── */
.header{padding:28px 0 18px;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.logo-mark{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,#1f6feb,#58a6ff);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:visible;
}
.logo-name{font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.logo-name span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-pill{padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);font-family:var(--mono)}
.stat-pill b{color:var(--text);font-weight:600}
.gh-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text2);font-family:var(--mono);text-decoration:none;transition:all .15s}
.gh-link:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.tagline{margin-top:8px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.last-updated{font-size:11px;font-family:var(--mono);color:var(--text3)}
.disclaimer{margin-top:8px;padding:7px 11px;background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.2);border-radius:var(--r);font-size:11px;color:var(--amber);font-family:var(--mono);display:inline-flex;align-items:center;gap:6px}

/* ── search ── */
.search-bar{padding:12px 0 0;position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding-bottom:8px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
#searchInput{width:100%;padding:8px 50px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
#searchInput::placeholder{color:var(--text3)}
.search-kb{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;pointer-events:none}

/* ── toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:8px 0 2px}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;flex:1}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:11px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--dot,var(--border2));flex-shrink:0}
.pill[data-cat="all"]::before{display:none}
.pill:hover{border-color:var(--border2);color:var(--text);background:var(--surface)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.08)}
.pill.active::before{background:var(--dot,var(--accent))}
.pc{font-size:9px;color:var(--text3)}
.pill.active .pc{color:var(--accent);opacity:.7}
.clear-btn{display:inline-flex;padding:3px 9px;border-radius:20px;border:1px solid rgba(248,81,73,.3);background:transparent;color:var(--red);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.clear-btn:hover{background:rgba(248,81,73,.1);border-color:var(--red)}
.view-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-group{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ctrl-btn{padding:3px 8px;background:transparent;border:none;font-size:11px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.ctrl-btn:hover{background:var(--surface);color:var(--text)}
.ctrl-btn.active{background:var(--s2);color:var(--text)}
.ctrl-btn+.ctrl-btn{border-left:1px solid var(--border)}

/* ── secondary filters ── */
.secondary-filters{display:flex;flex-wrap:wrap;gap:5px;padding:5px 0 2px;align-items:center}
.sf-label{font-size:10px;font-family:var(--mono);color:var(--text3);margin-right:2px}
.sf-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:10px;font-family:var(--mono);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.sf-pill:hover{border-color:var(--border2);color:var(--text)}
.sf-pill.active{background:var(--s2);color:var(--text);border-color:var(--border2)}
.sf-pill.diff-beginner.active{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.08)}
.sf-pill.diff-intermediate.active{border-color:var(--amber);color:var(--amber);background:rgba(210,153,34,.08)}
.sf-pill.diff-advanced.active{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.08)}

/* ── result bar ── */
.result-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 0 5px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.result-bar em{color:var(--accent);font-style:normal}

/* ── entries ── */
.entries{padding-bottom:80px}
.entry{display:grid;grid-template-columns:1fr auto;align-items:start;gap:10px;padding:8px 10px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:background .12s,border-color .12s;margin-bottom:2px;outline:none}
.entry:hover,.entry.focused{background:var(--surface);border-color:var(--border)}
.entry.focused{border-color:var(--accent)}
.entry:hover .entry-title,.entry.focused .entry-title{color:var(--accent)}
.entry-left{display:flex;align-items:flex-start;gap:8px;min-width:0}
.entry-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.entry-info{min-width:0;flex:1}
.entry-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.entry-title mark{background:rgba(88,166,255,.2);color:var(--accent);border-radius:2px;padding:0 2px}
.entry-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px}
.badge-cmd{font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:1px 6px;white-space:nowrap}
.badge-diff{font-size:9px;font-family:var(--mono);border-radius:10px;padding:1px 6px;white-space:nowrap;border:1px solid}
.badge-diff.beginner{color:var(--green);border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.08)}
.badge-diff.intermediate{color:var(--amber);border-color:rgba(210,153,34,.3);background:rgba(210,153,34,.08)}
.badge-diff.advanced{color:var(--red);border-color:rgba(248,81,73,.3);background:rgba(248,81,73,.08)}
.badge-owasp{font-size:9px;font-family:var(--mono);color:var(--text3);border:1px solid var(--border);border-radius:10px;padding:1px 5px;white-space:nowrap;background:var(--s2)}
.entry-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.entry-tag{font-size:10px;font-family:var(--mono);color:var(--text3);padding:1px 5px;background:var(--s2);border:1px solid var(--border);border-radius:3px;white-space:nowrap;cursor:pointer;transition:all .12s}
.entry-tag:hover,.entry-tag.hl{color:var(--accent);border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.08)}
.entry-tools{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.tool-badge{font-size:9px;font-family:var(--mono);color:var(--text3);padding:1px 5px;background:transparent;border:1px dashed var(--border);border-radius:3px;white-space:nowrap}
.entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.entry-cat{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--text3);background:var(--s2);white-space:nowrap}
.fav-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);line-height:1;padding:0 2px;transition:color .15s}
.fav-btn:hover{color:#f1c40f}
.fav-btn.starred{color:#f1c40f}
body.comfortable .entry{padding:13px 14px;margin-bottom:4px}
body.comfortable .entry-title{font-size:14px}
.no-results{padding:60px 0;text-align:center;color:var(--text3);font-family:var(--mono);font-size:13px;display:none}

/* ── recently viewed ── */
.recent-section{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.recent-pills{display:flex;flex-wrap:wrap;gap:4px}
.recent-pill{font-size:11px;font-family:var(--mono);color:var(--text2);padding:3px 9px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--surface);transition:all .15s;white-space:nowrap}
.recent-pill:hover{border-color:var(--accent);color:var(--accent)}

/* ── modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(1,4,9,.85);z-index:200;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-hdr-left{flex:1;min-width:0}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.modal-cat{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--text3);padding:2px 7px;border:1px solid var(--border);border-radius:10px;background:var(--s2)}
.modal-cat::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--mdot,var(--border2))}
.modal-diff{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;border:1px solid}
.modal-diff.beginner{color:var(--green);border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.08)}
.modal-diff.intermediate{color:var(--amber);border-color:rgba(210,153,34,.3);background:rgba(210,153,34,.08)}
.modal-diff.advanced{color:var(--red);border-color:rgba(248,81,73,.3);background:rgba(248,81,73,.08)}
.modal-owasp-list{display:flex;gap:4px;flex-wrap:wrap}
.modal-owasp{font-size:10px;font-family:var(--mono);color:var(--text3);padding:2px 6px;border:1px solid var(--border);border-radius:10px;background:var(--s2);cursor:help}
.modal-cmd-count{font-size:11px;font-family:var(--mono);color:var(--text3)}
.modal-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.copy-all-btn{padding:4px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.copy-all-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-all-btn.ok{border-color:var(--green);color:var(--green)}
.modal-fav{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);transition:color .15s;padding:2px}
.modal-fav:hover,.modal-fav.starred{color:#f1c40f}
.modal-x{width:26px;height:26px;border-radius:var(--r);border:1px solid var(--border);background:var(--s2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal-x:hover{border-color:var(--accent);color:var(--accent)}
.modal-body{padding:18px}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.modal-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:14px}
.modal-tag{font-size:10px;font-family:var(--mono);color:var(--text3);padding:2px 6px;background:var(--s2);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .12s}
.modal-tag:hover{color:var(--accent);border-color:rgba(88,166,255,.3)}
.modal-tools{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:14px;align-items:center}
.tools-label{font-size:10px;font-family:var(--mono);color:var(--text3);margin-right:2px}
.modal-tool{font-size:10px;font-family:var(--mono);color:var(--text3);padding:2px 7px;border:1px dashed var(--border);border-radius:3px}
.cmd-block{margin-bottom:12px}
.cmd-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.cmd-code{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 52px 10px 12px;font-family:var(--mono);font-size:12px;color:#7ee787;line-height:1.65;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:6px;right:6px;padding:2px 7px;background:var(--s2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.ok{border-color:var(--green);color:var(--green)}
.notes{margin-top:12px;padding:10px 12px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.12);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.6;font-family:var(--mono)}
.notes strong{color:var(--accent);font-weight:600}

/* ── toast ── */
.toast{position:fixed;bottom:20px;right:20px;padding:8px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:var(--mono);color:var(--text2);z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
  .header-right .stat-pill{display:none}
  .entry{grid-template-columns:1fr}
  .entry-right{flex-direction:row;justify-content:flex-start}
  .entry-cat{display:none}
  .view-controls{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" style="display:block">
  <!-- web thread -->
  <line x1="12" y1="0" x2="12" y2="4" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="12" cy="14.5" rx="3.8" ry="4.5" fill="white"/>
  <!-- head -->
  <circle cx="12" cy="8.5" r="2.8" fill="white"/>
  <!-- eyes -->
  <circle cx="10.8" cy="8" r="0.8" fill="#1a56cc"/>
  <circle cx="13.2" cy="8" r="0.8" fill="#1a56cc"/>

          <span class="modal-owasp-list" id="modalOwasp"></span>
        </div>
      </div>

        <button class="modal-fav" id="modalFav" title="Favourite">&#9734;</button>

<div class="toast" id="toast"></div>

<script>
// ── Theme: apply BEFORE render to avoid flash ─────────────────────────────
(function(){
  try {
    const saved = localStorage.getItem('wb_theme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.setAttribute('data-theme', saved);
    }
  } catch(e) {}
})();

// ── App ───────────────────────────────────────────────────────────────────
const CAT_COLORS = {"API": "#38bdf8", "Authentication": "#f59e0b", "File": "#22c55e", "Injection": "#ef4444", "Misc": "#94a3b8", "Recon": "#818cf8", "Source Code": "#c084fc", "Web Shells": "#fb923c"};
const OWASP_LABELS = {"A01": "Broken Access Control", "A02": "Cryptographic Failures", "A03": "Injection", "A04": "Insecure Design", "A05": "Security Misconfiguration", "A06": "Vulnerable Components", "A07": "Auth Failures", "A08": "Integrity Failures", "A09": "Logging Failures", "A10": "SSRF"};
const VER = '0dadfaf0';

let DATA = [];
let q = '', activeFilter = 'all', activeDiff = '', activeOwasp = '';
let focusedIdx = -1, filteredData = [], currentModalIdx = -1;

function lsGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

let favourites = lsGet('wb_favs') || [];
let recentlyViewed = lsGet('wb_recent') || [];
function saveFavs() { lsSet('wb_favs', favourites); }
function saveRecent() { lsSet('wb_recent', recentlyViewed); }

function addRecent(title) {
  recentlyViewed = [title, ...recentlyViewed.filter(t => t !== title)].slice(0, 5);
  saveRecent(); renderRecent();
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}
function highlight(text, query) {
  if (!query) return esc(text);
  const eq = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp('(' + eq + ')', 'gi'), '<mark>$1</mark>');
}
function showToast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms || 2500);
}
function updateClearBtn() {
  const cb = document.getElementById('clearBtn');
  if (cb) cb.style.display = (q || activeFilter !== 'all' || activeDiff || activeOwasp) ? 'inline-flex' : 'none';
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('list');
  const lq = q.toLowerCase().trim();
  focusedIdx = -1;

  filteredData = DATA.filter(e => {
    if (activeFilter !== 'all' && e.cat !== activeFilter) return false;
    if (activeDiff && e.difficulty !== activeDiff) return false;
    if (activeOwasp && !(e.owasp || []).includes(activeOwasp)) return false;
    if (!lq) return true;
    return e.title.toLowerCase().includes(lq)
      || e.cat.toLowerCase().includes(lq)
      || (e.tags || []).some(t => t.toLowerCase().includes(lq))
      || (e.desc || '').toLowerCase().includes(lq)
      || (e.cmds || []).some(c => c.c.toLowerCase().includes(lq) || c.l.toLowerCase().includes(lq))
      || (e.tools || []).some(t => t.toLowerCase().includes(lq));
  });

  document.getElementById('noResults').style.display = filteredData.length === 0 ? 'block' : 'none';
  document.getElementById('resultCount').innerHTML = (lq || activeFilter !== 'all' || activeDiff || activeOwasp)
    ? 'Showing <em>' + filteredData.length + '</em> of ' + DATA.length + ' techniques'
    : '<em>' + DATA.length + '</em> techniques';

  list.innerHTML = filteredData.map((e, fi) => {
    const col = CAT_COLORS[e.cat] || '#94a3b8';
    const idx = DATA.indexOf(e);
    const isFav = favourites.includes(e.title);
    const tagHtml = (e.tags || []).slice(0, 5).map(t =>
      '<span class="entry-tag' + (lq && t.toLowerCase().includes(lq) ? ' hl' : '') + '" data-tag="' + esc(t) + '">' + esc(t) + '</span>'
    ).join('');
    const toolHtml = (e.tools || []).slice(0, 4).map(t => '<span class="tool-badge">' + esc(t) + '</span>').join('');
    const owaspHtml = (e.owasp || []).map(o =>
      '<span class="badge-owasp" title="' + esc(OWASP_LABELS[o] || o) + '">' + o + '</span>'
    ).join('');
    return '<div class="entry" data-idx="' + idx + '" data-fi="' + fi + '" tabindex="0">'
      + '<div class="entry-left">'
      + '<span class="entry-dot" style="background:' + col + '"></span>'
      + '<div class="entry-info">'
      + '<div class="entry-title">' + highlight(e.title, lq) + '</div>'
      + '<div class="entry-badges">'
      + '<span class="badge-cmd">' + e.cmds.length + ' cmd' + (e.cmds.length !== 1 ? 's' : '') + '</span>'
      + '<span class="badge-diff ' + e.difficulty + '">' + e.difficulty + '</span>'
      + owaspHtml + '</div>'
      + '<div class="entry-tags">' + tagHtml + '</div>'
      + (toolHtml ? '<div class="entry-tools">' + toolHtml + '</div>' : '')
      + '</div></div>'
      + '<div class="entry-right">'
      + '<span class="entry-cat">' + esc(e.cat) + '</span>'
      + '<button class="fav-btn' + (isFav ? ' starred' : '') + '" data-title="' + esc(e.title) + '" title="' + (isFav ? 'Unfavourite' : 'Favourite') + '">' + (isFav ? '&#9733;' : '&#9734;') + '</button>'
      + '</div></div>';
  }).join('');

  list.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.classList.contains('entry-tag')) {
        ev.stopPropagation();
        document.getElementById('searchInput').value = ev.target.dataset.tag;
        q = ev.target.dataset.tag; render(); return;
      }
      if (ev.target.classList.contains('fav-btn')) {
        ev.stopPropagation(); toggleFav(ev.target.dataset.title); return;
      }
      openModal(parseInt(el.dataset.idx));
    });
    el.addEventListener('focus', () => { focusedIdx = parseInt(el.dataset.fi); updateFocus(); });
  });
  updateClearBtn();
}

function updateFocus() {
  document.querySelectorAll('.entry').forEach(el =>
    el.classList.toggle('focused', parseInt(el.dataset.fi) === focusedIdx)
  );
}

function toggleFav(title) {
  if (favourites.includes(title)) {
    favourites = favourites.filter(t => t !== title);
    showToast('Removed from favourites');
  } else {
    favourites.push(title);
    showToast('Added to favourites ★');
  }
  saveFavs(); render();
  if (currentModalIdx >= 0 && DATA[currentModalIdx].title === title) {
    const btn = document.getElementById('modalFav');
    const starred = favourites.includes(title);
    btn.innerHTML = starred ? '&#9733;' : '&#9734;';
    btn.classList.toggle('starred', starred);
  }
  renderRecent();
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(idx) {
  currentModalIdx = idx;
  const e = DATA[idx];
  const col = CAT_COLORS[e.cat] || '#94a3b8';
  const isFav = favourites.includes(e.title);

  document.getElementById('modalTitle').textContent = e.title;
  const catEl = document.getElementById('modalCat');
  catEl.textContent = e.cat; catEl.style.setProperty('--mdot', col);
  const diffEl = document.getElementById('modalDiff');
  diffEl.textContent = e.difficulty || ''; diffEl.className = 'modal-diff ' + (e.difficulty || '');
  document.getElementById('modalCmdCount').textContent = e.cmds.length + ' command' + (e.cmds.length !== 1 ? 's' : '');
  document.getElementById('modalOwasp').innerHTML = (e.owasp || []).map(o =>
    '<span class="modal-owasp" title="' + esc(OWASP_LABELS[o] || o) + '">' + esc(o) + '</span>'
  ).join('');

  const favBtn = document.getElementById('modalFav');
  favBtn.innerHTML = isFav ? '&#9733;' : '&#9734;';
  favBtn.classList.toggle('starred', isFav);

  history.replaceState(null, '', '#' + encodeURIComponent(e.title));
  addRecent(e.title);

  let html = '<div class="modal-tags">'
    + (e.tags || []).map(t => '<span class="modal-tag" data-tag="' + esc(t) + '">' + esc(t) + '</span>').join('')
    + '</div><div class="modal-desc">' + esc(e.desc) + '</div>';

  if ((e.tools || []).length) {
    html += '<div class="modal-tools"><span class="tools-label">Requires:</span>'
      + (e.tools || []).map(t => '<span class="modal-tool">' + esc(t) + '</span>').join('') + '</div>';
  }

  e.cmds.forEach((cmd, i) => {
    html += '<div class="cmd-block"><div class="cmd-label">' + esc(cmd.l) + '</div>'
      + '<div class="cmd-code" id="cc_' + idx + '_' + i + '">'
      + '<button class="copy-btn" data-t="cc_' + idx + '_' + i + '">copy</button>'
      + esc(cmd.c) + '</div></div>';
  });
  if (e.notes) html += '<div class="notes">' + esc(e.notes) + '</div>';

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const pre = document.getElementById(btn.dataset.t);
      navigator.clipboard.writeText(pre.innerText.replace(/^copy/, '').trim()).then(() => {
        btn.textContent = 'copied!'; btn.classList.add('ok');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1800);
      });
    });
  });
  document.querySelectorAll('.modal-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      closeModal();
      document.getElementById('searchInput').value = tag.dataset.tag;
      q = tag.dataset.tag; render();
    });
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModalIdx = -1;
  history.replaceState(null, '', location.pathname + location.search);
}

document.getElementById('copyAllBtn').addEventListener('click', () => {
  if (currentModalIdx < 0) return;
  const e = DATA[currentModalIdx];
  const txt = e.cmds.map(c => '# ' + c.l + '
' + c.c).join('

');
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✓ Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.innerHTML = '&#8599; Copy all'; btn.classList.remove('ok'); }, 2000);
  });
});
document.getElementById('modalFav').addEventListener('click', () => {
  if (currentModalIdx >= 0) toggleFav(DATA[currentModalIdx].title);
});
document.getElementById('modalX').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── Keyboard nav ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const open = document.getElementById('modalOverlay').classList.contains('open');
  if (e.key === 'Escape') { closeModal(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); return; }
  if (open) return;
  const inSearch = document.activeElement === document.getElementById('searchInput');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedIdx = inSearch ? 0 : Math.min(focusedIdx + 1, filteredData.length - 1);
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) { el.focus(); el.scrollIntoView({ block: 'nearest' }); }
    updateFocus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (focusedIdx <= 0) { document.getElementById('searchInput').focus(); focusedIdx = -1; }
    else focusedIdx--;
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) { el.focus(); el.scrollIntoView({ block: 'nearest' }); }
    updateFocus();
  } else if (e.key === 'Enter' && focusedIdx >= 0) {
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) openModal(parseInt(el.dataset.idx));
  }
});

// ── Filters ───────────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  q = ''; activeFilter = 'all'; activeDiff = ''; activeOwasp = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.pill[data-cat="all"]').classList.add('active');
  document.querySelectorAll('.sf-pill').forEach(p => p.classList.remove('active'));
  render();
});
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    if (p.id === 'clearBtn') return;
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active'); activeFilter = p.dataset.cat; render();
  });
});
document.getElementById('searchInput').addEventListener('input', e => { q = e.target.value; render(); });
document.querySelectorAll('.sf-pill[data-diff]').forEach(p => {
  p.addEventListener('click', () => {
    const d = p.dataset.diff;
    activeDiff = activeDiff === d ? '' : d;
    document.querySelectorAll('.sf-pill[data-diff]').forEach(x => x.classList.remove('active'));
    if (activeDiff) p.classList.add('active');
    render();
  });
});
document.querySelectorAll('.sf-pill[data-owasp]').forEach(p => {
  p.addEventListener('click', () => {
    const o = p.dataset.owasp;
    activeOwasp = activeOwasp === o ? '' : o;
    document.querySelectorAll('.sf-pill[data-owasp]').forEach(x => x.classList.remove('active'));
    if (activeOwasp) p.classList.add('active');
    render();
  });
});

// ── View density ──────────────────────────────────────────────────────────
document.getElementById('viewCompact').addEventListener('click', () => {
  document.body.classList.remove('comfortable');
  document.getElementById('viewCompact').classList.add('active');
  document.getElementById('viewComfy').classList.remove('active');
  lsSet('wb_density', 'compact');
});
document.getElementById('viewComfy').addEventListener('click', () => {
  document.body.classList.add('comfortable');
  document.getElementById('viewComfy').classList.add('active');
  document.getElementById('viewCompact').classList.remove('active');
  lsSet('wb_density', 'comfortable');
});
if (lsGet('wb_density') === 'comfortable') {
  document.body.classList.add('comfortable');
  document.getElementById('viewComfy').classList.add('active');
  document.getElementById('viewCompact').classList.remove('active');
}

// ── Theme toggle ──────────────────────────────────────────────────────────
function getCurrentTheme() {
  const attr = document.documentElement.getAttribute('data-theme');
  if (attr) return attr;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  lsSet('wb_theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'light' ? '☽' : '☀';
}
document.getElementById('themeBtn').addEventListener('click', () => {
  applyTheme(getCurrentTheme() === 'light' ? 'dark' : 'light');
});
// Set correct initial icon
applyTheme(getCurrentTheme());

// ── Recently viewed / Favourites ──────────────────────────────────────────
function renderRecent() {
  const sec = document.getElementById('recentSection');
  const pills = document.getElementById('recentPills');
  sec.style.display = (recentlyViewed.length || favourites.length) ? 'block' : 'none';
  let html = '';
  if (favourites.length) {
    html += '<button class="recent-pill" id="favFilterBtn" style="border-color:rgba(241,196,15,.4);color:#f1c40f">★ Favourites (' + favourites.length + ')</button> ';
  }
  html += recentlyViewed.map(t => '<button class="recent-pill" data-title="' + esc(t) + '">' + esc(t) + '</button>').join('');
  pills.innerHTML = html;
  const fb = document.getElementById('favFilterBtn');
  if (fb) fb.addEventListener('click', showFavourites);
  pills.querySelectorAll('.recent-pill[data-title]').forEach(p => {
    p.addEventListener('click', () => { const idx = DATA.findIndex(e => e.title === p.dataset.title); if (idx >= 0) openModal(idx); });
  });
}

function showFavourites() {
  if (!favourites.length) { showToast('No favourites yet — star a technique first'); return; }
  filteredData = DATA.filter(e => favourites.includes(e.title));
  document.getElementById('resultCount').innerHTML = '<em>' + filteredData.length + '</em> favourites';
  const list = document.getElementById('list');
  list.innerHTML = filteredData.map((e, fi) => {
    const col = CAT_COLORS[e.cat] || '#94a3b8';
    const idx = DATA.indexOf(e);
    return '<div class="entry" data-idx="' + idx + '" data-fi="' + fi + '" tabindex="0">'
      + '<div class="entry-left"><span class="entry-dot" style="background:' + col + '"></span>'
      + '<div class="entry-info"><div class="entry-title">' + esc(e.title) + '</div>'
      + '<div class="entry-badges"><span class="badge-diff ' + e.difficulty + '">' + e.difficulty + '</span></div></div></div>'
      + '<div class="entry-right"><span class="entry-cat">' + esc(e.cat) + '</span>'
      + '<button class="fav-btn starred" data-title="' + esc(e.title) + '" title="Unfavourite">&#9733;</button></div></div>';
  }).join('');
  list.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.classList.contains('fav-btn')) { ev.stopPropagation(); toggleFav(ev.target.dataset.title); return; }
      openModal(parseInt(el.dataset.idx));
    });
  });
}

// ── Deep link ─────────────────────────────────────────────────────────────
function checkHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) { const idx = DATA.findIndex(e => e.title === hash); if (idx >= 0) openModal(idx); }
}

// ── Service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js?v=' + VER).catch(() => {}));
}
window.addEventListener('online',  () => showToast('Back online'));
window.addEventListener('offline', () => showToast('Offline — cached content available', 3000));

// ── Boot ──────────────────────────────────────────────────────────────────
fetch('./data.json?v=' + VER)
  .then(r => r.json())
  .then(d => {
    DATA = d;
    const allTags = new Set(DATA.flatMap(e => e.tags || []));
    document.getElementById('statE').textContent = DATA.length;
    document.getElementById('statT').textContent = allTags.size;
    render();
    renderRecent();
    checkHash();
  })
  .catch(() => showToast('Could not load data.json', 4000));
</script>
</body>
</html>
