<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
  --border:#30363d;--border2:#3d444d;
  --accent:#58a6ff;--accent2:#1f6feb;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --green:#3fb950;--red:#f85149;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --r:6px;--rl:12px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* layout */
.wrap{max-width:1000px;margin:0 auto;padding:0 20px}

/* header */
.header{padding:32px 0 20px;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#58a6ff);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;flex-shrink:0}
.logo-name{font-size:20px;font-weight:600;letter-spacing:-.3px}
.logo-name span{color:var(--accent)}
.header-stats{display:flex;gap:8px}
.stat-pill{padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);font-family:var(--mono)}
.stat-pill b{color:var(--text);font-weight:600}
.tagline{margin-top:10px;font-size:13px;color:var(--text2)}
.disclaimer{margin-top:10px;padding:8px 12px;background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.2);border-radius:var(--r);font-size:12px;color:#d29922;font-family:var(--mono);display:inline-flex;align-items:center;gap:6px}

/* search bar - sticky */
.search-bar{padding:14px 0 0;position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding-bottom:10px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
#searchInput{width:100%;padding:9px 52px 9px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
#searchInput::placeholder{color:var(--text3)}
.search-kb{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;pointer-events:none}

/* filters */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 2px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--dot,var(--border2));flex-shrink:0}
.pill[data-cat="all"]::before{display:none}
.pill:hover{border-color:var(--border2);color:var(--text);background:var(--surface)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.08)}
.pill.active::before{background:var(--dot,var(--accent))}
.pill-count{font-size:10px;color:var(--text3)}
.pill.active .pill-count{color:var(--accent);opacity:.7}
.clear-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(248,81,73,.3);background:transparent;color:var(--red);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.clear-btn:hover{background:rgba(248,81,73,.1);border-color:var(--red)}

/* result bar */
.result-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;font-size:12px;color:var(--text3);font-family:var(--mono)}
.result-bar em{color:var(--accent);font-style:normal}

/* entry list */
.entries{padding-bottom:80px}
.entry{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:background .12s,border-color .12s;margin-bottom:2px;outline:none}
.entry:hover,.entry.focused{background:var(--surface);border-color:var(--border)}
.entry.focused{border-color:var(--accent)}
.entry:hover .entry-title,.entry.focused .entry-title{color:var(--accent)}
.entry-left{display:flex;align-items:flex-start;gap:10px;min-width:0}
.entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.entry-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.entry-title{font-size:13px;font-weight:500;color:var(--text)}
.entry-title mark{background:rgba(88,166,255,.25);color:var(--accent);border-radius:2px;padding:0 1px}
.entry-cmd-count{font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 6px;white-space:nowrap}
.entry-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.entry-tag{font-size:10px;font-family:var(--mono);color:var(--text3);padding:1px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;white-space:nowrap;cursor:pointer;transition:all .12s}
.entry-tag:hover,.entry-tag.hl{color:var(--accent);border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.08)}
.entry-cat{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--text3);background:var(--surface2);white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px}
.no-results{padding:60px 0;text-align:center;color:var(--text3);font-family:var(--mono);font-size:13px;display:none}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(1,4,9,.85);z-index:200;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-hdr-left{flex:1;min-width:0}
.modal-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.3}
.modal-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.modal-cat{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);padding:2px 8px;border:1px solid var(--border);border-radius:10px;background:var(--surface2)}
.modal-cat::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--mdot,var(--border2))}
.modal-cmd-count{font-size:11px;font-family:var(--mono);color:var(--text3)}
.modal-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.copy-all-btn{padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.copy-all-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-all-btn.ok{border-color:var(--green);color:var(--green)}
.modal-x{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal-x:hover{border-color:var(--accent);color:var(--accent)}
.modal-body{padding:20px}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.modal-tag{font-size:10px;font-family:var(--mono);color:var(--text3);padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .12s}
.modal-tag:hover{color:var(--accent);border-color:rgba(88,166,255,.3)}
.cmd-block{margin-bottom:14px}
.cmd-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:var(--mono);margin-bottom:5px}
.cmd-code{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px 52px 11px 13px;font-family:var(--mono);font-size:12px;color:#7ee787;line-height:1.65;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:7px;right:7px;padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.ok{border-color:var(--green);color:var(--green)}
.notes{margin-top:14px;padding:10px 13px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.12);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.6;font-family:var(--mono)}
.notes strong{color:var(--accent);font-weight:600}

/* offline toast */
.toast{position:fixed;bottom:20px;right:20px;padding:8px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:var(--mono);color:var(--text2);z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
  .header-stats{display:none}
  .entry{grid-template-columns:1fr}
  .entry-cat{display:none}
}
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark">W</div>
        <div class="logo-name">Web<span>Bins</span></div>
      </div>
      <div class="header-stats">
        <div class="stat-pill"><b id="statE">0</b> techniques</div>
        <div class="stat-pill"><b id="statT">0</b> tags</div>
      </div>
    </div>
    <div class="tagline">Quick-reference commands and payloads for web application penetration testing.</div>
    <div class="disclaimer">&#9888; Authorised pentesting and security research only. Explicit written permission required.</div>
  </header>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="searchInput" placeholder="Search techniques, tools, tags..." autocomplete="off" spellcheck="false">
      <span class="search-kb">Ctrl+K</span>
    </div>
    <div class="filter-row" id="filterRow">
      <button class="pill active" data-cat="all">All <span class="pill-count">55</span></button>
      <button class="pill" data-cat="API" style="--dot:#38bdf8">API <span class="pill-count">3</span></button>
      <button class="pill" data-cat="Authentication" style="--dot:#f59e0b">Authentication <span class="pill-count">10</span></button>
      <button class="pill" data-cat="File" style="--dot:#22c55e">File <span class="pill-count">2</span></button>
      <button class="pill" data-cat="Injection" style="--dot:#ef4444">Injection <span class="pill-count">17</span></button>
      <button class="pill" data-cat="Misc" style="--dot:#94a3b8">Misc <span class="pill-count">10</span></button>
      <button class="pill" data-cat="Recon" style="--dot:#818cf8">Recon <span class="pill-count">4</span></button>
      <button class="pill" data-cat="Source Code" style="--dot:#c084fc">Source Code <span class="pill-count">5</span></button>
      <button class="pill" data-cat="Web Shells" style="--dot:#fb923c">Web Shells <span class="pill-count">4</span></button>
      <button class="clear-btn" id="clearBtn" style="display:none">&#10005; Clear</button>
    </div>
  </div>

  <div class="entries">
    <div class="result-bar"><span id="resultCount"></span></div>
    <div id="list"></div>
    <div class="no-results" id="noResults">No results found</div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta">
          <span class="modal-cat" id="modalCat"></span>
          <span class="modal-cmd-count" id="modalCmdCount"></span>
        </div>
      </div>
      <div class="modal-actions">
        <button class="copy-all-btn" id="copyAllBtn">&#128203; Copy all</button>
        <button class="modal-x" id="modalX">&#10005;</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAT_COLORS = {"API": "#38bdf8", "Authentication": "#f59e0b", "File": "#22c55e", "Injection": "#ef4444", "Misc": "#94a3b8", "Recon": "#818cf8", "Source Code": "#c084fc", "Web Shells": "#fb923c"};
let DATA = [];
let q = '', activeFilter = 'all', focusedIdx = -1, filteredData = [];

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function highlight(text, query) {
  if (!query) return esc(text);
  const escaped = esc(text);
  const escapedQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + escapedQ + ')', 'gi'), '<mark>$1</mark>');
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2000);
}

function updateClearBtn() {
  const cb = document.getElementById('clearBtn');
  if (cb) cb.style.display = (q || activeFilter !== 'all') ? 'inline-flex' : 'none';
}

function render() {
  const list = document.getElementById('list');
  const lq = q.toLowerCase().trim();
  focusedIdx = -1;

  filteredData = DATA.filter(e => {
    const mf = activeFilter === 'all' || e.cat === activeFilter;
    if (!mf) return false;
    if (!lq) return true;
    return e.title.toLowerCase().includes(lq)
      || e.cat.toLowerCase().includes(lq)
      || e.tags.some(t => t.toLowerCase().includes(lq))
      || e.desc.toLowerCase().includes(lq);
  });

  document.getElementById('noResults').style.display = filteredData.length === 0 ? 'block' : 'none';
  document.getElementById('resultCount').innerHTML = (lq || activeFilter !== 'all')
    ? 'Showing <em>' + filteredData.length + '</em> of ' + DATA.length + ' techniques'
    : '<em>' + DATA.length + '</em> techniques';

  list.innerHTML = filteredData.map((e, fi) => {
    const col = CAT_COLORS[e.cat] || '#94a3b8';
    const realIdx = DATA.indexOf(e);
    const tagHtml = e.tags.slice(0, 6).map(t =>
      '<span class="entry-tag' + (lq && t.toLowerCase().includes(lq) ? ' hl' : '') + '" data-tag="' + esc(t) + '">' + esc(t) + '</span>'
    ).join('');
    return '<div class="entry" data-idx="' + realIdx + '" data-fi="' + fi + '" tabindex="0">'
      + '<div class="entry-left">'
      + '<span class="entry-dot" style="background:' + col + '"></span>'
      + '<div>'
      + '<div class="entry-title-row">'
      + '<span class="entry-title">' + highlight(e.title, lq) + '</span>'
      + '<span class="entry-cmd-count">' + e.cmds.length + ' cmd' + (e.cmds.length !== 1 ? 's' : '') + '</span>'
      + '</div>'
      + '<div class="entry-tags">' + tagHtml + '</div>'
      + '</div></div>'
      + '<span class="entry-cat">' + esc(e.cat) + '</span>'
      + '</div>';
  }).join('');

  // Click handlers
  list.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.classList.contains('entry-tag')) {
        ev.stopPropagation();
        const tag = ev.target.dataset.tag;
        document.getElementById('searchInput').value = tag;
        q = tag;
        render();
        return;
      }
      openModal(parseInt(el.dataset.idx));
    });
    el.addEventListener('focus', () => {
      focusedIdx = parseInt(el.dataset.fi);
      updateFocus();
    });
  });

  updateClearBtn();
}

function updateFocus() {
  document.querySelectorAll('.entry').forEach(el => {
    el.classList.toggle('focused', parseInt(el.dataset.fi) === focusedIdx);
  });
}

// ── Keyboard navigation ───────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  const modalOpen = document.getElementById('modalOverlay').classList.contains('open');

  if (e.key === 'Escape') { closeModal(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    return;
  }

  if (modalOpen) return;

  const active = document.activeElement;
  const inSearch = active === document.getElementById('searchInput');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (inSearch) { focusedIdx = 0; }
    else { focusedIdx = Math.min(focusedIdx + 1, filteredData.length - 1); }
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) { el.focus(); el.scrollIntoView({block:'nearest'}); }
    updateFocus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (focusedIdx <= 0) { document.getElementById('searchInput').focus(); focusedIdx = -1; }
    else { focusedIdx--; }
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) { el.focus(); el.scrollIntoView({block:'nearest'}); }
    updateFocus();
  } else if (e.key === 'Enter' && focusedIdx >= 0) {
    const el = document.querySelector('.entry[data-fi="' + focusedIdx + '"]');
    if (el) openModal(parseInt(el.dataset.idx));
  }
});

// ── Modal ─────────────────────────────────────────────────────────────────
let currentModalIdx = -1;

function openModal(idx) {
  currentModalIdx = idx;
  const e = DATA[idx];
  const col = CAT_COLORS[e.cat] || '#94a3b8';

  document.getElementById('modalTitle').textContent = e.title;
  const catEl = document.getElementById('modalCat');
  catEl.textContent = e.cat;
  catEl.style.setProperty('--mdot', col);
  document.getElementById('modalCmdCount').textContent = e.cmds.length + ' command' + (e.cmds.length !== 1 ? 's' : '');

  // Update URL hash for permalink
  history.replaceState(null, '', '#' + encodeURIComponent(e.title));

  let html = '<div class="modal-tags">'
    + e.tags.map(t => '<span class="modal-tag" data-tag="' + esc(t) + '">' + esc(t) + '</span>').join('')
    + '</div>';
  html += '<div class="modal-desc">' + esc(e.desc) + '</div>';
  e.cmds.forEach(function(cmd, i) {
    html += '<div class="cmd-block">'
      + '<div class="cmd-label">' + esc(cmd.l) + '</div>'
      + '<div class="cmd-code" id="cc_' + idx + '_' + i + '">'
      + '<button class="copy-btn" data-t="cc_' + idx + '_' + i + '">copy</button>'
      + esc(cmd.c) + '</div></div>';
  });
  if (e.notes) html += '<div class="notes">' + esc(e.notes) + '</div>';

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Copy individual command buttons
  document.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      const pre = document.getElementById(btn.dataset.t);
      const txt = pre.innerText.replace(/^copy/, '').trim();
      navigator.clipboard.writeText(txt).then(function() {
        btn.textContent = 'copied!'; btn.classList.add('ok');
        setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1800);
      });
    });
  });

  // Modal tag click -> filter by tag
  document.querySelectorAll('.modal-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      closeModal();
      document.getElementById('searchInput').value = tag.dataset.tag;
      q = tag.dataset.tag;
      render();
    });
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', location.pathname + location.search);
}

// Copy all commands
document.getElementById('copyAllBtn').addEventListener('click', function() {
  if (currentModalIdx < 0) return;
  const e = DATA[currentModalIdx];
  const txt = e.cmds.map(c => '# ' + c.l + '\n' + c.c).join('\n\n');
  navigator.clipboard.writeText(txt).then(function() {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✓ Copied!'; btn.classList.add('ok');
    setTimeout(function() { btn.textContent = '⧉ Copy all'; btn.classList.remove('ok'); }, 2000);
  });
});

document.getElementById('modalX').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Filters
document.getElementById('clearBtn').addEventListener('click', function() {
  q = ''; activeFilter = 'all';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.pill[data-cat="all"]').classList.add('active');
  render();
});

document.querySelectorAll('.pill').forEach(function(p) {
  p.addEventListener('click', function() {
    if (p.id === 'clearBtn') return;
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.cat;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  q = e.target.value; render();
});

// ── Deep link via hash ────────────────────────────────────────────────────
function checkHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) {
    const idx = DATA.findIndex(e => e.title === hash);
    if (idx >= 0) openModal(idx);
  }
}

// ── Service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')
    .catch(e => console.warn('SW:', e)));
}

window.addEventListener('online',  () => showToast('Back online', 2000));
window.addEventListener('offline', () => showToast('Offline — cached content available', 3000));

// ── Load data from data.json ──────────────────────────────────────────────
fetch('./data.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    const allTags = new Set(DATA.flatMap(e => e.tags));
    document.getElementById('statE').textContent = DATA.length;
    document.getElementById('statT').textContent = allTags.size;
    render();
    checkHash();
  })
  .catch(() => {
    // Fallback: try inline data if fetch fails (e.g. file:// protocol)
    showToast('Could not load data.json — check the file is in the same directory', 4000);
  });
</script>
</body>
</html>
